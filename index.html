<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>/</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>*</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>+</button>

            <button>0</button>
            <button>.</button>
            <button id="equals">=</button>
            <button>-</button>

            <button id="clears">C</button>


        </div>
    </div>

    <script src="calculator.js"></script>

</body>

</html>
